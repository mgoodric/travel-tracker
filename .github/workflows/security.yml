name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: travel-tracker:scan
          load: true

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: travel-tracker:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
